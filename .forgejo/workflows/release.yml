name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.20.0-rc1). Leave empty for a timestamped SNAPSHOT.'
        required: false

jobs:
  publish:
    runs-on: docker-node

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            # Strip leading 'v' if present (e.g. v2.20.0 -> 2.20.0)
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="0.0.0-$(date -u +%Y%m%d%H%M%S)-SNAPSHOT"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '18'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Maven
        uses: https://github.com/stCarolas/setup-maven@v5
      - name: event
        run: |
             cat <<'EOF'
             ${{ toJSON(forgejo) }}
             EOF
      - name: Publish
        run: mvn --batch-mode --settings .forgejo/settings.xml clean deploy -Drevision=${{ steps.version.outputs.version }}
        env:
          FORGEJO_TOKEN: ${{ secrets.AUTH_TOKEN }}
          FORGEJO_ACTOR: ${{ env.FORGEJO_ACTOR }}
